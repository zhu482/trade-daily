<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贝塞尔外贸情报 · AI日报生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #c0392b;
    --dark: #1a1a1a;
    --mid: #555;
    --light: #f5f5f0;
    --border: #e0e0d8;
    --white: #fff;
  }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--light);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    background: var(--white);
    border-bottom: 2px solid var(--dark);
    padding: 18px 24px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: .05em;
  }
  header .logo span { color: var(--red); }
  header .tagline {
    font-size: .75rem;
    color: var(--mid);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* ── Main ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Hero ── */
  .hero {
    text-align: center;
    margin-bottom: 40px;
  }
  .hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
  }
  .hero h1 em {
    color: var(--red);
    font-style: normal;
    border-bottom: 2px solid var(--red);
  }
  .hero p {
    color: var(--mid);
    font-size: .9rem;
    line-height: 1.7;
  }

  /* ── Input Card ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
    width: 100%;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }

  .card label {
    display: block;
    font-size: .8rem;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .input-row input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 11px 14px;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
  }
  .input-row input:focus { border-color: var(--dark); }
  .input-row input::placeholder { color: #bbb; }

  .btn-generate {
    background: var(--red);
    color: var(--white);
    border: none;
    border-radius: 3px;
    padding: 11px 22px;
    font-size: .9rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s;
    letter-spacing: .04em;
  }
  .btn-generate:hover { opacity: .85; }
  .btn-generate:disabled { opacity: .45; cursor: not-allowed; }

  /* ── Presets ── */
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .presets span {
    font-size: .75rem;
    color: var(--mid);
    align-self: center;
    margin-right: 4px;
  }
  .preset-tag {
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 5px 12px;
    font-size: .8rem;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .preset-tag:hover {
    background: var(--dark);
    color: var(--white);
    border-color: var(--dark);
  }

  /* ── Status / Progress ── */
  .status-box {
    margin-top: 28px;
    width: 100%;
    display: none;
  }
  .status-box.visible { display: block; }

  .progress-steps {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .step {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-size: .88rem;
  }
  .step:last-child { border-bottom: none; }
  .step .icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .75rem;
    flex-shrink: 0;
  }
  .step.pending .icon { background: var(--border); color: #999; }
  .step.running .icon { background: #f0a500; color: #fff; animation: pulse 1s infinite; }
  .step.done .icon { background: #27ae60; color: #fff; }
  .step.error .icon { background: var(--red); color: #fff; }
  .step .label { flex: 1; color: var(--mid); }
  .step.running .label { color: var(--dark); font-weight: 500; }
  .step.done .label { color: var(--dark); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Result ── */
  .result-box {
    margin-top: 20px;
    width: 100%;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    display: none;
  }
  .result-box.visible { display: block; }
  .result-box h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.05rem;
    margin-bottom: 14px;
  }
  .result-box h3 span { color: var(--red); }
  .result-link {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--light);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 12px 16px;
  }
  .result-link a {
    flex: 1;
    color: var(--red);
    text-decoration: none;
    font-size: .9rem;
    word-break: break-all;
  }
  .result-link a:hover { text-decoration: underline; }
  .btn-open {
    background: var(--dark);
    color: var(--white);
    border: none;
    border-radius: 3px;
    padding: 8px 16px;
    font-size: .82rem;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-open:hover { opacity: .8; }

  .error-msg {
    color: var(--red);
    font-size: .85rem;
    margin-top: 10px;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: .75rem;
    color: #aaa;
    border-top: 1px solid var(--border);
    background: var(--white);
  }
  footer a { color: #aaa; text-decoration: none; }
  footer a:hover { color: var(--dark); }
</style>
</head>
<body>

<header>
  <div class="logo">贝塞尔<span>外贸情报</span></div>
  <div class="tagline">AI Industry Daily · Powered by Bezier</div>
</header>

<main>
  <div class="hero">
    <h1>输入行业，生成<em>专属日报</em></h1>
    <p>AI 自动抓取全球资讯、原材料行情、竞品动态<br>生成面向外贸老板的每日情报简报</p>
  </div>

  <div class="card">
    <label>你的行业关键词</label>
    <div class="input-row">
      <input type="text" id="keyword-input" placeholder="例如：铣刀、液压阀、紧固件、不锈钢管..." maxlength="60" />
      <button class="btn-generate" id="gen-btn" onclick="startGenerate()">生成日报</button>
    </div>
    <div class="presets">
      <span>快选：</span>
      <div class="preset-tag" onclick="setKeyword('铣刀 切削工具')">铣刀</div>
      <div class="preset-tag" onclick="setKeyword('液压阀 液压元件')">液压阀</div>
      <div class="preset-tag" onclick="setKeyword('紧固件 螺丝 螺栓')">紧固件</div>
      <div class="preset-tag" onclick="setKeyword('不锈钢管 钢材')">不锈钢管</div>
      <div class="preset-tag" onclick="setKeyword('电动工具 五金工具')">电动工具</div>
      <div class="preset-tag" onclick="setKeyword('阀门 管件')">阀门</div>
    </div>
  </div>

  <div class="status-box" id="status-box">
    <ul class="progress-steps" id="steps-list">
      <li class="step pending" id="step-fetch">
        <div class="icon">1</div>
        <div class="label">搜索行业资讯与原材料行情</div>
      </li>
      <li class="step pending" id="step-analyze">
        <div class="icon">2</div>
        <div class="label">AI 分析与提炼关键情报</div>
      </li>
      <li class="step pending" id="step-build">
        <div class="icon">3</div>
        <div class="label">生成 HTML 日报</div>
      </li>
      <li class="step pending" id="step-publish">
        <div class="icon">4</div>
        <div class="label">发布到 GitHub Pages</div>
      </li>
    </ul>
  </div>

  <div class="result-box" id="result-box">
    <h3>✅ 日报已生成 — <span id="result-industry"></span></h3>
    <div class="result-link">
      <a href="#" id="result-url" target="_blank">正在获取链接...</a>
      <button class="btn-open" onclick="openReport()">打开日报 →</button>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>
</main>

<footer>
  <a href="https://bezier.top">bezier.top</a> · 贝塞尔砍刀出品 · 外贸老板的AI情报员
</footer>

<script>
// ── Config ──────────────────────────────────────────────
// OpenClaw Gateway API (通过 Cloudflare Tunnel 代理)
// 生产环境替换为实际地址和 token
const OPENCLAW_API = 'https://openclaw.bezier.top';
const OPENCLAW_TOKEN = ''; // 从环境变量或后端中转获取

// GitHub Pages 日报发布地址模板
const REPORT_BASE_URL = 'https://zhu482.github.io/trade-daily/';

// ── State ───────────────────────────────────────────────
let resultUrl = '';
let pollingInterval = null;
let jobSessionKey = null;

// ── UI Helpers ───────────────────────────────────────────
function setKeyword(kw) {
  document.getElementById('keyword-input').value = kw;
  document.getElementById('keyword-input').focus();
}

function setStep(id, state) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'step ' + state;
  const icon = el.querySelector('.icon');
  if (state === 'done') icon.textContent = '✓';
  else if (state === 'error') icon.textContent = '✗';
  else if (state === 'running') icon.textContent = '●';
  else icon.textContent = el.id.replace('step-','').replace('fetch','1').replace('analyze','2').replace('build','3').replace('publish','4');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

function clearError() {
  document.getElementById('error-msg').classList.remove('visible');
}

// ── Main Flow ─────────────────────────────────────────────
async function startGenerate() {
  const keyword = document.getElementById('keyword-input').value.trim();
  if (!keyword) {
    document.getElementById('keyword-input').focus();
    return;
  }

  clearError();
  document.getElementById('result-box').classList.remove('visible');
  document.getElementById('status-box').classList.add('visible');
  document.getElementById('gen-btn').disabled = true;

  // Reset steps
  ['step-fetch','step-analyze','step-build','step-publish'].forEach(id => setStep(id, 'pending'));

  try {
    await runDailyPipeline(keyword);
  } catch(e) {
    showError('生成失败：' + (e.message || '未知错误'));
    document.getElementById('gen-btn').disabled = false;
  }
}

async function runDailyPipeline(keyword) {
  // Step 1: 搜索
  setStep('step-fetch', 'running');
  await delay(800);

  // 调用 OpenClaw webchat API 触发日报生成
  // 发送消息给 OpenClaw，触发外贸日报 Skill
  const prompt = `生成外贸行业日报，行业关键词：${keyword}，发布到 GitHub 仓库 zhu482/trade-daily`;

  let response;
  try {
    response = await callOpenClaw(prompt);
  } catch(e) {
    // Demo 模式：模拟流程（OpenClaw token 未配置时）
    await simulatePipeline(keyword);
    return;
  }

  setStep('step-fetch', 'done');
  setStep('step-analyze', 'running');
  await delay(1000);
  setStep('step-analyze', 'done');
  setStep('step-build', 'running');
  await delay(1200);
  setStep('step-build', 'done');
  setStep('step-publish', 'running');
  await delay(800);
  setStep('step-publish', 'done');

  showResult(keyword, REPORT_BASE_URL);
}

async function callOpenClaw(message) {
  if (!OPENCLAW_TOKEN) throw new Error('token not configured');
  const res = await fetch(`${OPENCLAW_API}/api/chat`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${OPENCLAW_TOKEN}`
    },
    body: JSON.stringify({ message })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// Demo 模式（token 未配置时模拟进度）
async function simulatePipeline(keyword) {
  setStep('step-fetch', 'running');
  await delay(1800);
  setStep('step-fetch', 'done');

  setStep('step-analyze', 'running');
  await delay(2500);
  setStep('step-analyze', 'done');

  setStep('step-build', 'running');
  await delay(2000);
  setStep('step-build', 'done');

  setStep('step-publish', 'running');
  await delay(1200);
  setStep('step-publish', 'done');

  // Demo：直接指向已有日报
  const demoUrl = 'https://zhu482.github.io/milling-daily/';
  showResult(keyword, demoUrl);
}

function showResult(keyword, url) {
  resultUrl = url;
  document.getElementById('result-industry').textContent = keyword;
  const link = document.getElementById('result-url');
  link.href = url;
  link.textContent = url;
  document.getElementById('result-box').classList.add('visible');
  document.getElementById('gen-btn').disabled = false;
}

function openReport() {
  if (resultUrl) window.open(resultUrl, '_blank');
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// Enter 键触发
document.getElementById('keyword-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startGenerate();
});
</script>
</body>
</html>
